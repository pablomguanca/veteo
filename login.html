<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0b0e" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Veteo" />
    <meta name="description" content="Veteo - Acceso a Gestión de vencimientos en tienda" />

    <title>Ingreso - Veteo App</title>

    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./assets/img/icon-192.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=Google+Sans+Mono&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <main class="auth-container">
        <section class="auth-card" aria-labelledby="auth-title">
            <header class="auth-card__header">
                <h1 id="auth-title" class="auth-card__title">Veteo App</h1>
                <p class="auth-card__subtitle">Centro de Gestión de Próximos a Vencer</p>
            </header>

            <div class="auth-card__actions">
                <div class="btn-google" id="btn-google-front">
                </div>
            </div>

            <footer class="auth-card__footer">
                <p id="error-message" class="auth-error" role="alert" aria-live="assertive"
                    style="color: #fca5a5; margin-top: 16px; text-align: center; font-size: 0.9rem;" hidden></p>
            </footer>
        </section>
    </main>
    <script src="./js/login.js" type="module"></script>
</body>

</html>
