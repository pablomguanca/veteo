<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0b0e" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Veteo" />
    <meta name="description" content="Veteo - Acceso a Gestión de vencimientos en tienda" />

    <title>Ingreso - Veteo App</title>

    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./assets/img/icon-192.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=Google+Sans+Mono&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
    <main class="auth-container">
        <section class="auth-card" aria-labelledby="auth-title">
            <header class="auth-card__header">
                <h1 id="auth-title" class="auth-card__title">Veteo App</h1>
                <p class="auth-card__subtitle">Centro de Gestión de Próximos a Vencer</p>
            </header>

            <div class="auth-card__actions">
                <button type="button" id="btn-google" class="btn-login">
                    <div class="btn-login__icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="btn-login__icon">
                            <path fill="#EA4335"
                                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                            <path fill="#4285F4"
                                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                            <path fill="#FBBC05"
                                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                            <path fill="#34A853"
                                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                            <path fill="none" d="M0 0h48v48H0z" />
                        </svg>
                    </div>
                    <span class="btn-login__text">Ingresar con Google</span>
                </button>
            </div>

            <footer class="auth-card__footer">
                <p id="error-message" class="auth-error" role="alert" aria-live="assertive"
                    style="color: #fca5a5; margin-top: 16px; text-align: center; font-size: 0.9rem;" hidden></p>
            </footer>
        </section>
    </main>
    <script src="./js/login.js" type="module"></script>
</body>

</html>
